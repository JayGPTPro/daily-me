<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#grad)"/>
  <!-- Newspaper icon -->
  <g transform="translate(28, 28)" fill="white">
    <!-- Main paper -->
    <rect x="0" y="8" width="64" height="52" rx="4" fill="white" opacity="0.95"/>
    <!-- Top fold -->
    <rect x="4" y="4" width="56" height="8" rx="2" fill="white" opacity="0.7"/>
    <!-- Headline bar -->
    <rect x="8" y="16" width="36" height="4" rx="2" fill="#6C5CE7" opacity="0.8"/>
    <!-- Text lines -->
    <rect x="8" y="26" width="48" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
    <rect x="8" y="32" width="44" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
    <rect x="8" y="38" width="40" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
    <!-- Image placeholder -->
    <rect x="8" y="46" width="20" height="14" rx="3" fill="#6C5CE7" opacity="0.15"/>
    <!-- More text lines -->
    <rect x="34" y="46" width="22" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
    <rect x="34" y="52" width="18" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
    <rect x="34" y="58" width="20" height="2.5" rx="1" fill="#6C5CE7" opacity="0.25"/>
  </g>
  <!-- Sparkle -->
  <circle cx="98" cy="22" r="6" fill="white" opacity="0.9"/>
  <circle cx="98" cy="22" r="3" fill="#FFD93D"/>
</svg>
