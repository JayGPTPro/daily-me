            <h1 class="article-title">קרן המטבע: הכלכלה העולמית נמצאת "בצל המלחמה"</h1>
            <div class="article-body">
                <p>קרן המטבע הבינלאומית (IMF) פרסמה הסוף השבוע את תחזית הכלכלה העולמית לאפריל 2026 תחת הכותרת הדרמטית "הכלכלה בצל המלחמה". הדו"ח מתאר שיבוש חמור בסחר הגלובלי כתוצאה מהמשבר הצבאי במזרח התיכון.
